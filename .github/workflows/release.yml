name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.4.68)'
        required: true
        type: string

env:
  PYTHON_VERSION: '3.12'
  UV_VERSION: 'latest'
  PYTHONIOENCODING: 'utf-8'
  PYTHONUTF8: '1'
  PYTHONLEGACYWINDOWSSTDIO: '0'

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv pip install pyinstaller pytest pytest-asyncio

      - name: Run tests
        run: |
          uv run pytest tests/ -v --tb=short --ignore=tests/test_netease_rest_api.py --ignore=tests/test_safe_search.py --ignore=tests/test_sound_search_feature.py --ignore=tests/test_sound_type_search.py --ignore=tests/test_retry_mechanism.py --ignore=tests/test_fallback_search.py --ignore=tests/test_lyric_manager.py --ignore=tests/test_lyric_fetch.py --ignore=tests/test_radio_simple.py
        continue-on-error: true

      - name: Build executable (onedir mode)
        run: |
          uv run python build_tools/build_exe.py --skip-tests

      - name: Set release tag
        id: release_tag
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.version }}') {
            echo "tag=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Package executable
        shell: pwsh
        run: |
          $version = "${{ steps.release_tag.outputs.tag }}" -replace '^v', ''
          $zipName = "Imusic_${version}_Windows_x64.zip"
          $distDir = "dist/Imusic"
          
          if (Test-Path $distDir) {
            Compress-Archive -Path "$distDir/*" -DestinationPath "$zipName" -Force
            echo "PACKAGED=true" >> $env:GITHUB_ENV
          } else {
            echo "⚠ Build output directory not found: $distDir"
            Get-ChildItem dist/ -Recurse | Out-String
            echo "PACKAGED=false" >> $env:GITHUB_ENV
          }

      - name: Upload artifact
        if: env.PACKAGED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: "*.zip"
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-executable
          path: dist/windows

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          if ('${{ github.event.inputs.version }}') {
            echo "version=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "version=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Generate changelog
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}" -replace '^v', ''
          $historyContent = Get-Content "history.md" -Raw -Encoding UTF8

          # Extract the changelog section for this version
          $pattern = "## v${version}[\s\S]*?(?=## v\d|$)"
          $match = [regex]::Match($historyContent, $pattern)

          if ($match.Success) {
            $changelog = $match.Value.Trim()
          } else {
            $changelog = "See [history.md](https://github.com/${{ github.repository }}/blob/main/history.md) for details."
          }

          # Output using heredoc syntax for multiline values
          echo "changelog<<EOF" >> $env:GITHUB_OUTPUT
          echo $changelog >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}" -replace '^v', ''
          $changelog = "${{ steps.changelog.outputs.changelog }}"

          # Build release notes with proper escaping
          $notes = "## Imusic v$version`n`n"
          $notes += "### 📥 下载`n"
          $notes += "- **Windows**: [Imusic_${version}_Windows_x64.zip](https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/Imusic_${version}_Windows_x64.zip)`n`n"
          $notes += "### 📝 变更日志`n"
          $notes += "$changelog`n`n"
          $notes += "---`n`n"
          $notes += "### 💡 使用说明`n"
          $notes += "1. 下载并解压 ZIP 文件`n"
          $notes += "2. 运行 Imusic.exe 启动程序`n"
          $notes += "3. Windows Defender 可能会提示未知发布者，点击""更多信息"" → ""仍要运行""`n"
          $notes += "4. 音频转换功能需要安装 [FFmpeg](https://ffmpeg.org/)`n`n"
          $notes += "### 📋 系统要求`n"
          $notes += "- Windows 10/11 (64-bit)`n"
          $notes += "- FFmpeg (可选，用于音频格式转换)`n`n"
          $notes += "---`n"
          $notes += "*Automatically generated by GitHub Actions*"

          # Write to file to avoid parsing issues
          $notesPath = Join-Path $env:RUNNER_TEMP "release_notes.md"
          $notes | Out-File -FilePath $notesPath -Encoding UTF8

          echo "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Imusic ${{ steps.get_version.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.notes_path }}
          draft: false
          prerelease: false
          files: |
            dist/windows/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
